<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Expressive Weather Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        :root {
            --bg-color: #0b0d14;
            --surface-color: #111318;
            --surface-variant: #1a1c22;
            --outline-color: #2d3139;
            --text-primary: #e2e2e9;
            --text-secondary: #a8c7fa;
            --accent-blue: #3b82f6;
            --accent-yellow: #facc15;
            --alert-red: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 480px; 
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Status Message */
        #status-message {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 20px;
            padding: 0 16px;
        }

        /* Header / Location Styling */
        .weather-header {
            padding: 16px 8px;
            text-align: left;
            display: none; 
        }
        .location-title {
            font-size: 28px;
            font-weight: 500;
            margin: 0 0 4px 0;
        }
        .current-temp-main {
            font-size: 72px;
            font-weight: 300;
            margin: 0;
            line-height: 1;
        }
        .current-condition-text {
            font-size: 18px;
            color: var(--text-secondary);
            margin: 8px 0 0 0;
            text-transform: capitalize;
        }

        /* Material 3 Expressive Base Card */
        .m3-card {
            background-color: var(--surface-color);
            border-radius: 28px;
            padding: 20px;
            box-sizing: border-box;
            display: none; 
        }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }

        /* Horizontal Scroll Containers */
        .scroll-row {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 8px;
            scrollbar-width: none; 
        }
        .scroll-row::-webkit-scrollbar {
            display: none;
        }

        /* Hourly Item Styles */
        .hourly-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 55px;
            text-align: center;
        }
        .hourly-box .temp { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
        .hourly-box img { width: 32px; height: 32px; }
        .hourly-box .pop { font-size: 11px; color: var(--accent-blue); min-height: 15px; margin: 4px 0; font-weight: 500;}
        .hourly-box .time { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

        /* Daily Capsule Pills Styles */
        .daily-capsule {
            border: 1px solid var(--outline-color);
            border-radius: 40px;
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 65px;
            box-sizing: border-box;
            background: var(--surface-variant);
        }
        .daily-capsule .max-temp { font-weight: 600; font-size: 15px; }
        .daily-capsule .min-temp { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
        .daily-capsule img { width: 32px; height: 32px; }
        .daily-capsule .pop { font-size: 11px; color: var(--accent-blue); min-height: 15px; margin: 6px 0; font-weight: 500;}
        .daily-capsule .day { font-size: 13px; font-weight: 500; margin-top: 4px; }
        .daily-capsule .date { font-size: 11px; color: var(--text-secondary); }

        /* Bento Grid Layout */
        .bento-grid {
            display: none; 
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .bento-cell {
            background-color: var(--surface-color);
            border-radius: 28px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 140px;
            box-sizing: border-box;
        }
        .bento-cell-value {
            font-size: 26px;
            font-weight: 600;
            margin: 12px 0 4px 0;
        }
        .bento-cell-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Rain Chart Styles */
        .rain-chart-wrapper { display: none; } 
        svg.rain-svg { display: block; width: 100%; height: 100px; overflow: visible; }
        .grid-line { stroke: rgba(255,255,255,0.1); stroke-width: 1; }
        .rain-line { fill: none; stroke: #3498db; stroke-width: 2.5; vector-effect: non-scaling-stroke; }
        .rain-fill { fill: rgba(52, 152, 219, 0.15); stroke: none; }
        .x-axis-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); margin-top: 8px;}

        /* Meteograms (ChartJS Panel) Styles */
        .chart-container { position: relative; width: 100%; height: 220px; margin-bottom: 12px; }
        .condition-bar { display: flex; height: 6px; margin: 0 10px 6px 10px; border-radius: 3px; overflow: hidden; }
        .condition-segment { flex: 1; border-right: 1px solid var(--surface-color); }
        .condition-segment:last-child { border-right: none; }

        /* Footer / Utilities */
        .footer-tools {
            text-align: center;
            margin-top: 24px;
            padding-bottom: 24px;
        }
        .reset-btn {
            background: none;
            border: none;
            color: var(--outline-color);
            font-size: 12px;
            text-decoration: underline;
            cursor: pointer;
            padding: 8px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div id="status-message">Initializing...</div>

        <!-- Header View -->
        <div class="weather-header" id="header-card">
            <div class="location-title" id="location-name">Loading...</div>
            <h1 class="current-temp-main" id="current-temp">--°</h1>
            <div class="current-condition-text" id="current-desc">--</div>
        </div>

        <!-- 60 Min Rain Graph Widget (Conditional) -->
        <div id="rain-card" class="m3-card rain-chart-wrapper">
            <div class="card-title">Rain - next 60 minutes</div>
            <svg class="rain-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <line x1="0" y1="0" x2="100" y2="0" class="grid-line" />
                <line x1="0" y1="25" x2="100" y2="25" class="grid-line" />
                <line x1="0" y1="50" x2="100" y2="50" class="grid-line" />
                <line x1="0" y1="75" x2="100" y2="75" class="grid-line" />
                <path id="rainFill" class="rain-fill" d="" />
                <path id="rainPath" class="rain-line" d="" />
            </svg>
            <div class="x-axis-labels">
                <span>0m</span><span>15m</span><span>30m</span><span>45m</span><span>60m</span>
            </div>
        </div>

        <!-- 24 Hourly Forecast Scroll Row -->
        <div class="m3-card" id="hourly-card">
            <div class="card-title">Hourly forecast</div>
            <div class="scroll-row" id="hourly-scroll"></div>
        </div>

        <!-- 7-Day Forecast Scroll Row (Capsule Pill Design) -->
        <div class="m3-card" id="daily-card">
            <div class="card-title">7-day forecast</div>
            <div class="scroll-row" id="daily-scroll"></div>
        </div>

        <!-- Bento Layout Grid for Secondary Data Metrics -->
        <div class="bento-grid" id="bento-card">
            <div class="bento-cell">
                <div class="card-title">Wind</div>
                <div>
                    <div class="bento-cell-value" id="bento-wind">-- mph</div>
                    <div class="bento-cell-label" id="bento-wind-dir">Direction: --</div>
                </div>
            </div>
            <div class="bento-cell">
                <div class="card-title">Pressure</div>
                <div>
                    <div class="bento-cell-value" id="bento-pressure">-- hPa</div>
                    <div class="bento-cell-label">Steady</div>
                </div>
            </div>
            <div class="bento-cell">
                <div class="card-title">Humidity</div>
                <div>
                    <div class="bento-cell-value" id="bento-humidity">--%</div>
                    <div class="bento-cell-label" id="bento-dewpoint">Dew point: --</div>
                </div>
            </div>
            <div class="bento-cell">
                <div class="card-title">UV Index</div>
                <div>
                    <div class="bento-cell-value" id="bento-uvi">--</div>
                    <div class="bento-cell-label" id="bento-uv-label">--</div>
                </div>
            </div>
        </div>

        <!-- Analytical Meteograms Section -->
        <div class="m3-card" id="analytics-card">
            <div class="card-title">24 hour analytics graph</div>
            <div id="condition-bar-24" class="condition-bar"></div>
            <div class="chart-container">
                <canvas id="meteogram-24"></canvas>
            </div>

            <div class="card-title" style="margin-top:24px;">7 day analytics graph</div>
            <div id="condition-bar-7" class="condition-bar"></div>
            <div class="chart-container">
                <canvas id="meteogram-7"></canvas>
            </div>
        </div>

        <div class="footer-tools">
            <button class="reset-btn" onclick="resetApiKey()">Reset API Key</button>
        </div>

    </div>

    <script>
        // ==========================================
        // LOCAL STORAGE AND GEOLOCATION LOGIC
        // ==========================================
        let API_KEY = localStorage.getItem('openWeatherKey');

        document.addEventListener("DOMContentLoaded", () => {
            // Check if key exists; prompt if it doesn't
            if (!API_KEY) {
                API_KEY = prompt("Welcome! Please enter your OpenWeather One Call API 3.0 Key:");
                if (API_KEY) {
                    localStorage.setItem('openWeatherKey', API_KEY);
                } else {
                    document.getElementById('status-message').innerHTML = "API Key is required. <br><br> Refresh the page to enter it.";
                    return;
                }
            }

            requestLocationAndFetch();
        });

        function requestLocationAndFetch() {
            document.getElementById('status-message').textContent = "Requesting location...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        document.getElementById('status-message').textContent = "Fetching weather data...";
                        fetchWeatherData(lat, lon);
                    },
                    (error) => {
                        document.getElementById('status-message').textContent = "Location access denied or failed. Please enable location services for this site.";
                        console.error("Geolocation error:", error);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                document.getElementById('status-message').textContent = "Geolocation is not supported by this browser.";
            }
        }

        function resetApiKey() {
            if(confirm("Are you sure you want to remove your saved API key?")) {
                localStorage.removeItem('openWeatherKey');
                location.reload();
            }
        }

        // ==========================================
        // DATA FETCHING LOGIC
        // ==========================================
        async function fetchWeatherData(lat, lon) {
            try {
                // 1. Fetch Location Name (Reverse Geocoding)
                const geoUrl = `https://api.openweathermap.org/geo/1.0/reverse?lat=${lat}&lon=${lon}&limit=1&appid=${API_KEY}`;
                const geoRes = await fetch(geoUrl);
                
                if (geoRes.status === 401) {
                    throw new Error("Invalid API Key. Please click 'Reset API Key' at the bottom of the page and try again.");
                }
                
                const geoData = await geoRes.json();
                const locationName = (geoData && geoData.length > 0) ? geoData[0].local_names?.en || geoData[0].name : "Unknown Location";

                // 2. Fetch One Call API 3.0 (Metric Units for °C and mm)
                const weatherUrl = `https://api.openweathermap.org/data/3.0/onecall?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`;
                const weatherRes = await fetch(weatherUrl);
                
                if (!weatherRes.ok) throw new Error("Failed to fetch weather data. Make sure you are subscribed to One Call API 3.0.");
                const weatherData = await weatherRes.json();

                // 3. Hide status message and show UI elements
                document.getElementById('status-message').style.display = 'none';
                document.getElementById('header-card').style.display = 'block';
                document.getElementById('hourly-card').style.display = 'block';
                document.getElementById('daily-card').style.display = 'block';
                document.getElementById('bento-card').style.display = 'grid';
                document.getElementById('analytics-card').style.display = 'block';

                // 4. Initialize Dashboard
                initDashboard(weatherData, locationName);

            } catch (error) {
                document.getElementById('status-message').innerHTML = `<span style="color:var(--alert-red)">${error.message}</span>`;
                console.error(error);
            }
        }

        // ==========================================
        // UI RENDERING LOGIC
        // ==========================================
        function initDashboard(data, locationName) {
            document.getElementById('location-name').textContent = locationName;

            // --- CURRENT WEATHER ---
            const current = data.current;
            document.getElementById('current-temp').textContent = Math.round(current.temp) + '°';
            document.getElementById('current-desc').textContent = current.weather[0].description;
            
            // UK Hybrid Conversions: Convert m/s to mph
            const windMph = Math.round(current.wind_speed * 2.23694);
            document.getElementById('bento-wind').textContent = windMph + ' mph';
            document.getElementById('bento-wind-dir').textContent = 'From angle ' + current.wind_deg + '°';
            document.getElementById('bento-pressure').textContent = current.pressure + ' hPa';
            document.getElementById('bento-humidity').textContent = current.humidity + '%';
            document.getElementById('bento-dewpoint').textContent = 'Dew point ' + Math.round(current.dew_point || current.feels_like) + '°';
            document.getElementById('bento-uvi').textContent = current.uvi;
            
            let uvText = "Low";
            if(current.uvi >= 3) uvText = "Moderate";
            if(current.uvi >= 6) uvText = "High";
            if(current.uvi >= 8) uvText = "Very High";
            document.getElementById('bento-uv-label').textContent = uvText;

            // --- MINUTELY RAIN GRAPH ---
            if (data.minutely && data.minutely.length > 0) {
                const values = data.minutely.map(m => m.precipitation);
                const totalRainDetected = values.reduce((a, b) => a + b, 0);
                
                if (totalRainDetected > 0) {
                    document.getElementById('rain-card').style.display = 'block';
                    let maxActual = Math.max(...values);
                    let maxVal = maxActual <= 1 ? 1 : maxActual;
                    
                    const points = values.map((val, i) => {
                        let x = (i / (values.length - 1)) * 100;
                        let y = 100 - ((val / maxVal) * 100);
                        return {x, y};
                    });

                    let d = `M ${points[0].x} ${points[0].y}`;
                    for (let i = 0; i < points.length - 1; i++) {
                        let midX = (points[i].x + points[i+1].x) / 2;
                        let midY = (points[i].y + points[i+1].y) / 2;
                        d += ` Q ${points[i].x} ${points[i].y}, ${midX} ${midY}`;
                    }
                    d += ` L ${points[points.length-1].x} ${points[points.length-1].y}`;

                    document.getElementById('rainPath').setAttribute('d', d);
                    document.getElementById('rainFill').setAttribute('d', d + ` L 100 100 L 0 100 Z`);
                }
            }

            // --- HOURLY SCROLL ROW ---
            const hourlyContainer = document.getElementById('hourly-scroll');
            hourlyContainer.innerHTML = ''; // Clear container
            data.hourly.slice(0, 24).forEach((hour, idx) => {
                const date = new Date(hour.dt * 1000);
                const timeString = idx === 0 ? 'Now' : date.getHours().toString().padStart(2, '0') + ':00';
                const popVal = hour.pop > 0 ? Math.round(hour.pop * 100) + '%' : '';
                const iconCode = hour.weather[0].icon;

                const box = document.createElement('div');
                box.className = 'hourly-box';
                box.innerHTML = `
                    <span class="temp">${Math.round(hour.temp)}°</span>
                    <img src="https://openweathermap.org/img/wn/${iconCode}@2x.png" alt="icon">
                    <span class="pop">${popVal}</span>
                    <span class="time">${timeString}</span>
                `;
                hourlyContainer.appendChild(box);
            });

            // --- DAILY CAPSULE GRID ---
            const dailyContainer = document.getElementById('daily-scroll');
            dailyContainer.innerHTML = ''; // Clear container
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            data.daily.forEach((day, idx) => {
                const date = new Date(day.dt * 1000);
                const dayString = idx === 0 ? 'Today' : dayNames[date.getDay()];
                const dateString = date.getDate().toString().padStart(2, '0') + '/' + (date.getMonth() + 1).toString().padStart(2, '0');
                const popVal = day.pop > 0 ? Math.round(day.pop * 100) + '%' : '';
                const iconCode = day.weather[0].icon;

                const capsule = document.createElement('div');
                capsule.className = 'daily-capsule';
                capsule.innerHTM
